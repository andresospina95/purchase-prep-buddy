services:
  db:
    image: postgres:16-alpine
    container_name: cigo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cigo
      POSTGRES_PASSWORD: cigo_secret_change_me
      POSTGRES_DB: cigo
    volumes:
      - cigo_db:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cigo -d cigo"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    image: cigo-oc:latest
    container_name: cigo-oc
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://cigo:cigo_secret_change_me@db:5432/cigo
    ports:
      - "3000:3000"

volumes:
  cigo_db:
